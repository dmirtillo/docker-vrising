name: Docker Image CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  build-and-test:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Run E2E Startup Test
      run: ./scripts/test-startup.sh

    - name: Show logs on failure
      if: failure()
      run: |
        docker ps -a
        # The script might have already removed the container, 
        # but the script itself should have printed the tail of logs on timeout.
        # This step is a safety net.
